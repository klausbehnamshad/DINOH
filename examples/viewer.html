const sel = document.getElementById('rec');
DATA.order.forEach(id=>{const r=DATA.records[id];const o=document.createElement('option');o.value=id;o.textContent=id+" — "+r.title;sel.appendChild(o);});
function gate(){return document.querySelector('input[name=gate]:checked').value;}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function parseVTT(v){const out=[];const blocks=v.split(/\n\n+/);for(const b of blocks){const m=b.match(/(\d{2}:\d{2}:\d{2}\.\d{3})\s*--\>\s*(\d{2}:\d{2}:\d{2}\.\d{3})\n([\s\S]*)/);if(m)out.push({s:m[1],e:m[2],t:m[3].trim()});}return out;}
function render(){
  const id=sel.value, r=DATA.records[id], g=gate();
  const openMode=(g==='open');
  // meta + badge
  const badge = openMode
    ? '<span class="badge allow">Gate offen: open + public &rarr; Synopsis sichtbar</span>'
    : '<span class="badge deny">'+esc(r.accessRights)+' / '+esc(r.consent_status)+' &rarr; Struktur-only</span>';
  document.getElementById('meta').innerHTML =
    '<span><b>'+esc(id)+'</b></span><span>Sprache: '+esc(r.language)+'</span>'+
    '<span>accessRights: <code>'+esc(r.accessRights)+'</code></span>'+
    '<span>consent_status: <code>'+esc(r.consent_status)+'</code></span>'+badge;
  // VTT
  const cues=parseVTT(r.vtt);
  document.querySelector('#vtt tbody').innerHTML = cues.map((c,i)=>
    '<tr><td>'+(i+1)+'</td><td class="mono">'+c.s+'</td><td class="mono">'+c.e+'</td><td>'+esc(c.t)+'</td></tr>').join('');
  // OHMS
  const xml = openMode ? r.ohms_open : r.ohms_real;
  const doc = new DOMParser().parseFromString(xml,'application/xml');
  const g_ = t => (doc.querySelector('record > '+t)?.textContent || '');
  const syn = g_('synopsis');
  const pts = [...doc.querySelectorAll('index > point')];
  let h='';
  ['record_id','title','date','interviewer','language','coverage','usage','consent_status','keywords'].forEach(f=>{
    h+='<div class="kv"><span class="k">'+f+'</span>'+esc(g_(f))+'</div>';});
  h+= syn
    ? '<div class="synopsis"><b>synopsis:</b> '+esc(syn)+'</div>'
    : '<div class="synopsis empty">synopsis: — (redigiert: '+esc(r.accessRights)+'/'+esc(r.consent_status)+')</div>';
  h+='<table><thead><tr><th>time (s)</th><th>title</th><th>partial_transcript</th></tr></thead><tbody>'+
     pts.map(p=>{const pt=p.querySelector('partial_transcript');return '<tr><td class="mono">'+esc(p.querySelector('time')?.textContent||'')+
     '</td><td>'+esc(p.querySelector('title')?.textContent||'')+'</td><td>'+(pt?esc(pt.textContent):'<span style=color:#bbb>—</span>')+'</td></tr>';}).join('')+
     '</tbody></table>';
  document.getElementById('ohms').innerHTML=h;
  document.getElementById('raw').textContent=xml;
}
